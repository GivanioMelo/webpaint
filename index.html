<!DOCTYPE html>
<html class="dark" lang="pt-br">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>WebPaint | Kinetic Grid Editor</title>
    <link rel="shortcut icon" href="assets/paint-palette.png" type="image/x-icon">
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@jaames/iro@5"></script>
    <link rel="stylesheet" href="darkmode.css">
</head>

<body>

    <!-- TopNavBar -->
    <header>
        <div class="navGroup">
            <span class="logo">WebPaint</span>
            <nav class="topNav">
                <!-- Zoom controls -->
                <div class="zoomControls">
                    <button id="btnZoomOut" class="zoomBtn" title="Zoom Out">
                        <span class="material-symbols-outlined">zoom_out</span>
                    </button>
                    <span id="zoomDisplay" class="zoomDisplay">100%</span>
                    <button id="btnZoomIn" class="zoomBtn" title="Zoom In">
                        <span class="material-symbols-outlined">zoom_in</span>
                    </button>
                </div>
                <!-- Load PNG -->
                <input type="file" id="inputLoadPng" accept="image/png" style="display: none;">
                <button id="btnLoadPng" class="navBtn">
                    <span class="material-symbols-outlined">file_upload</span> Load PNG
                </button>
                <!-- Export -->
                <button id="btnExport" class="navBtn">
                    <span class="material-symbols-outlined">image</span> Export PNG
                </button>
                <button id="btnExportGif" class="navBtn">
                    <span class="material-symbols-outlined">gif</span> Export GIF
                </button>
            </nav>
        </div>
        <div class="navGroup">
            <!-- Canvas Size Setup -->
            <label class="sizeLabel" title="Tamanho">Size:
                <select id="selectSize" class="sizeSelect">
                    <option value="16">16x16</option>
                    <option value="24">24x24</option>
                    <option value="32" selected>32x32</option>
                    <option value="48">48x48</option>
                    <option value="64">64x64</option>
                    <option value="96">96x96</option>
                    <option value="128">128x128</option>
                    <option value="256">256x256</option>
                    <option value="512">512x512</option>
                </select>
            </label>
        </div>
    </header>

    <div class="appLayout">
        <!-- SideNavBar (Left Toolbox) -->
        <aside class="sidebarLeft">
            <div class="toolbarHeader">
                <span class="toolbarTitle">TOOLS</span>
            </div>
            <button id="btnPencil" class="toolButton active-tool" title="Lápis (P)">
                <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">edit</span>
                <!-- <span class="toolLabel">Pencil</span> -->
            </button>
            <button id="btnEraser" class="toolButton" title="Borracha (E)">
                <span class="material-symbols-outlined">ink_eraser</span>
                <!-- <span class="toolLabel">Eraser</span> -->
            </button>
            <button id="btnBucket" class="toolButton" title="Balde de Tintas (B)">
                <span class="material-symbols-outlined">format_color_fill</span>
                <!-- <span class="toolLabel">Fill</span> -->
            </button>
            <button id="btnLine" class="toolButton" title="Linha (L)">
                <span class="material-symbols-outlined">diagonal_line</span>
                <!-- <span class="toolLabel">Line</span> -->
            </button>
            <button id="btnSelect" class="toolButton" title="Selecionar (S)">
                <span class="material-symbols-outlined">select_all</span>
                <!-- <span class="toolLabel">Select</span> -->
            </button>
            <button id="btnPan" class="toolButton" title="Pan / Mover (Space)">
                <span class="material-symbols-outlined">pan_tool</span>
                <!-- <span class="toolLabel">Pan</span> -->
            </button>
            <button id="btnContour" class="toolButton btnContour" title="Contorno (O) — Desenha outline ao redor dos pixels">
                <span class="material-symbols-outlined">extension</span>
                <!-- <span class="toolLabel">Outline</span> -->
            </button>

            <div class="toolBarSpacer">
                <label class="gridToggleLabel" title="Exibir/Esconder Grade">
                    <div class="gridToggleBox">
                        <input type="checkbox" id="chkGrid" checked class="gridToggleInput">
                        <span class="material-symbols-outlined">background_grid_small</span>
                    </div>
                </label>
                <button id="btnClearFrame" class="btnClearFrame material-symbols-outlined" title="Limpar todo o frame atual">mop</button>
            </div>
        </aside>

        <!-- Main Workspace Canvas -->
        <main>
            <div id="viewport" class="viewport" tabindex="0">
                <!-- Our canvas container inside viewport -->
                <div id="canvasContainer" class="canvas-container" style="transform-origin: 0 0;">
                    <canvas id="backgroundCanvas" class="backgroundCanvas"></canvas>
                    <canvas id="onionCanvas" class="onionCanvas" width="32" height="32"></canvas>
                    <canvas id="paintCanvas" class="paintCanvas" width="32" height="32"></canvas>
                    <canvas id="gridCanvas" class="gridCanvas" width="32" height="32"></canvas>
                </div>
            </div>

            <!-- Corner Brackets Design -->
            <div class="cornerBracket cornerBracket--tl"></div>
            <div class="cornerBracket cornerBracket--tr"></div>
            <div class="cornerBracket cornerBracket--bl"></div>
            <div class="cornerBracket cornerBracket--br"></div>
        </main>

        <!-- Right Sidebar (Color & Palettes) -->
        <aside class="sidebarRight">
            <!-- Preview Section -->
            <div class="previewSection">
                <div class="previewGlow"></div>
                <div class="previewFrame">
                    <canvas id="previewCanvas" width="32" height="32" class="previewCanvas"></canvas>
                </div>
            </div>

            <!-- FPS Section -->
            <div class="fpsSection">
                <span class="fpsSectionLabel">Animation Speed</span>
                <div class="fpsControls">
                    <span class="material-symbols-outlined fpsIcon">speed</span>
                    <input type="number" id="fpsInput" value="8" min="1" max="24" class="fpsInput">
                    <span class="fpsUnit">FPS</span>
                </div>
            </div>

            <!-- Color Wheel Section -->
            <div class="colorWheelSection">
                <h3 id="colorWheelToggle" class="collapsible-heading" title="Click to expand/collapse">
                    Cores
                    <span class="collapseChevron material-symbols-outlined">expand_less</span>
                </h3>
                <div id="colorWheelBody" class="colorWheelBody">
                    <div id="colorWheelContainer"></div>
                    <!-- Keep hidden for editor.js compatibility -->
                    <input type="color" id="colorPicker" value="#007bff" class="hidden">
                </div>
            </div>

            <div class="palettesPanel">
                <h3>Paletas de Cores</h3>

                <div class="palettePickerRow">
                    <div class="palettePickerSwatch">
                        <input type="color" id="paleteColorPicker" value="#007bff" class="invisible-color">
                        <div id="paleteColorDisplay" class="paletteColorDisplay"></div>
                    </div>
                    <button id="btnAddPaletteRow">Gerar Paleta</button>
                </div>

                <div id="paletteRows" class="paletteRows"></div>

                <!-- Layer Options -->
                <div class="configContainer">
                    <label class="configLabel">
                        <input type="checkbox" id="chkOnion" checked>
                        <span>Onion Skin Enabled</span>
                    </label>
                </div>
            </div>
        </aside>
    </div>

    <!-- BottomNavBar (Animation Timeline) -->
    <footer class="footer">
        <div class="frameNavGroup">
            <button id="btnPrev" class="frameNavBtn" title="Anterior">
                <span class="material-symbols-outlined">skip_previous</span>
            </button>
            <span id="frameIndicator" class="frameIndicator">FRAME: 1/1</span>
            <button id="btnNext" class="frameNavBtn" title="Próximo">
                <span class="material-symbols-outlined">skip_next</span>
            </button>
        </div>

        <div class="frameActionsGroup">
            <button id="btnAddFrame" class="btnAddFrame" title="Criar Novo Frame">
                <span class="material-symbols-outlined">add</span>
            </button>
            <button id="btnDuplicateFrame" class="btnDuplicateFrame" title="Duplicar Frame Atual">
                <span class="material-symbols-outlined">content_copy</span>
            </button>
            <button id="btnDeleteFrame" class="btnDeleteFrame" title="Apagar Frame Atual">
                <span class="material-symbols-outlined">delete</span>
            </button>
        </div>

        <div class="footerSpacer"></div>
    </footer>

    <!-- Custom Script to sync picker display arrays (since color inputs are invisible) -->
    <script>
        const cp = document.getElementById('colorPicker');
        const pcp = document.getElementById('paleteColorPicker');
        const pcpDisplay = document.getElementById('paleteColorDisplay');

        // Initialize iro.js Color Wheel
        const colorWheel = new iro.ColorPicker("#colorWheelContainer", {
            width: 180,
            color: cp.value,
            layout: [
                { component: iro.ui.Wheel },
                { component: iro.ui.Slider, options: { sliderType: 'value' } }
            ]
        });

        // Update editor.js colorPicker when wheel changes
        colorWheel.on('color:change', function(color) {
            cp.value = color.hexString;
            // Manually trigger change for editor.js listeners
            cp.dispatchEvent(new Event('change'));
        });

        function updateDisplays() {
            // Sync Wheel back if value changed from elsewhere (palettes/shortcuts)
            if (colorWheel.color.hexString.toLowerCase() !== cp.value.toLowerCase()) {
                colorWheel.color.set(cp.value);
            }
            
            if (pcpDisplay.style.backgroundColor !== pcp.value) {
                pcpDisplay.style.backgroundColor = pcp.value;
            }
        }
        setInterval(updateDisplays, 100);
    </script>
    <script src="editor.js" type="module"></script>
</body>

</html>
