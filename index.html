<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Sprite & Animation Tool (Onion Skin)</title>
    <link rel="stylesheet" href="editor.css">
</head>
<body>

    <div class="toolbar">
        <div class="config-group">
            <label for="selectSize">Tamanho:</label>
            <select id="selectSize" title="Altere o tamanho da tela de pintura. ATENÇÃO: se você fizer isso durante a edição, o desenho será apagado.">
                <option value="16">16x16</option>
                <option value="24">24x24</option>
                <option value="32" selected>32x32</option>
                <option value="48">48x48</option>
                <option value="64">64x64</option>
                <option value="96">96x96</option>
                <option value="128">128x128</option>
                <option value="256">256x256</option>
                <option value="512">512x512</option>
            </select>
        </div>
        <div class="tool-group">
            <button id="btnPencil" class="active-tool" title="Lápis (P)"><img src="assets/pencil.png"></button>
            <button id="btnLine" title="Linha Reta (L)"><img src="assets/line.png"></button>
            <button id="btnEraser" title="Borracha (E)"><img src="assets/eraser.png"></button>
            <button id="btnBucket" title="Balde de tinta (B)"><img src="assets/paintbucket.png"></button>
            <button id="btnSelect" title="Selecionar (S)"><img src="assets/select.png"></button>
            <button id="btnClearFrame" title="Limpar Frame Atual"><img src="assets/clear.png"></button>
        </div>

        <input type="color" id="colorPicker" value="#000000">

        <div class="zoom-group">
            <button id="btnZoomOut" title="Zoom Out"><img src="assets/zoomOut.png"></button>
            <span id="zoomDisplay">1000%</span>
            <button id="btnZoomIn" title="Zoom In"><img src="assets/zoomIn.png"></button>
            <button id="btnPan" title="Mover Tela (H)"><img src="assets/drag.png"></button>
        </div>

        <div class="nav-group">
            <button id="btnPrev" title="Frame anterior"><img src="assets/previous.png"></button>
            <span id="frameIndicator">Frame: 1 / 1</span>
            <button id="btnNext" title="Próximo frame"><img src="assets/next.png"></button>
            <button id="btnAddFrame" title="Adicionar frame"><img src="assets/addFrame.png"></button>
            <button id="btnDuplicateFrame" title="Duplicar Frame"><img src="assets/duplicateFrame.png"></button>
            <button id="btnDeleteFrame" title="Excluir Frame (Cuidado, se você excluir o frame errado pode perder parte do seu trabalho)"><img src="assets/removeframe.png"></button>
        </div>
        
        <div class="config-group">
            <label>
                <input type="checkbox" id="chkOnion" checked> Onion Skin
            </label>
        </div>

        
        <label><input type="checkbox" id="chkGrid" checked> Exibir/Esconder Grade</label>

        <button id="btnExport" title="Exportar PNG"><img src="assets/png.png"></button>
        <button id="btnExportGif" title="Exportar GIF"><img src="assets/gif.png"></button>
    </div>

    <!-- <div class="canvas-container">
        <canvas id="onionCanvas" width="32" height="32"></canvas>
        <canvas id="paintCanvas" width="32" height="32"></canvas>
        <canvas id="gridCanvas" width="320" height="320"></canvas>
    </div> -->

    <div class="viewport" id="viewport">
        <div class="canvas-container" id="canvasContainer">
            <canvas id="onionCanvas" width="32" height="32"></canvas>
            <canvas id="paintCanvas" width="32" height="32"></canvas>
            <canvas id="gridCanvas" width="32" height="32"></canvas>
        </div>
    </div>

    <div class="preview-panel">
        <canvas id="previewCanvas" width="32" height="32"></canvas>
        <div class="preview-controls">
            <label>FPS: <input type="number" id="fpsInput" value="8" min="1" max="24" style="width: 80px;" title="Ajuste da velocidade da animação em Frames Por Segundo (FPS)"></label>
        </div>
    </div>

    <div class="palette-panel">
        <h4><img src="assets/palete.png"> Paletas de Tons</h4>
        <div id="paletteRows">
            </div>
        <div class="palette-actions">
            <input type="color" id="paleteColorPicker" value="#007bff">
            <button id="btnAddPaletteRow"> Adicionar Paleta</button>
        </div>
    </div>

    <!-- <script src="https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.js"></script> -->
    <script src="editor.js" type="module"></script>
</body>
</html>
