<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Sprite & Animation Tool (Onion Skin)</title>
    <link rel="stylesheet" href="editor.css">
</head>
<body>

    <div class="toolbar">
        <div class="tool-group">
            <button id="btnPencil" class="active-tool" title="Lápis (P)"><img src="assets/pencil.png"></button>
            <button id="btnEraser" title="Borracha (E)"><img src="assets/eraser.png"></button>
            <button id="btnBucket"><img src="assets/paintbucket.png"></button>
            <button id="btnClearFrame" title="Limpar Frame Atual"><img src="assets/clear.png"></button>
        </div>

        <input type="color" id="colorPicker" value="#00FF00">
        
        <div class="nav-group">
            <button id="btnPrev">&lt; Ant</button>
            <span id="frameIndicator">Frame: 1 / 1</span>
            <button id="btnNext">Próx &gt;</button>
        </div>

        <button id="btnAddFrame"><img src="assets/addFrame.png"></button>
        
        <div class="config-group">
            <label>
                <input type="checkbox" id="chkOnion" checked> Onion Skin
            </label>
        </div>

        
        <label><input type="checkbox" id="chkGrid" checked> Exibir/Esconder Grade</label>

        <button id="btnExport">Exportar PNG</button>
        <button id="btnExportGif">Exportar GIF</button>
    </div>

    <div class="canvas-container">
        <canvas id="onionCanvas" width="32" height="32"></canvas>
        <canvas id="paintCanvas" width="32" height="32"></canvas>
        <canvas id="gridCanvas" width="320" height="320"></canvas>
    </div>

    <div class="preview-panel">
        <canvas id="previewCanvas" width="32" height="32"></canvas>
        <div class="preview-controls">
            <label>FPS: <input type="number" id="fpsInput" value="8" min="1" max="24" style="width: 40px;"></label>
        </div>
    </div>

    <div class="palette-panel">
        <h4>Paleta de Tons</h4>
        <div id="paletteRows">
            </div>
        <div class="palette-actions">
            <input type="color" id="mainColorPicker" value="#007bff">
            <button id="btnAddPaletteRow">+ Adicionar Cor</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.js"></script>
    <script src="editor.js"></script>
</body>
</html>
